# ┌───────────────────────┐
# │ arpatek - tmux Config │
# └───────────────────────┘

# ──[ Color Support ]──────────────────────────────────────────────────────────
# Tell tmux it is running in a 256-color + truecolor terminal.
# Without Tc, programs inside tmux (nvim, etc.) fall back to 256-color mode —
# catppuccin and other 24-bit themes will look washed out or incorrect.
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# ──[ Scrollback & Focus ]─────────────────────────────────────────────────────
# Default scrollback is 2000 lines — far too low for log tailing
set -g history-limit 50000

# Propagate focus events to programs inside panes so nvim can trigger autoread
# when a file changes on disk (requires focus-events in nvim too, which is default)
set -g focus-events on

# Refresh the status bar every 5 seconds (default is 15)
set -g status-interval 5

# ──[ Prefix Key ]─────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ──[ Splitting Windows ]──────────────────────────────────────────────────────
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# ──[ Basic Usability ]────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ──[ Reload Config ]──────────────────────────────────────────────────────────
bind r source-file "~/.config/tmux/tmux.conf" \; display-message "tmux.conf reloaded"

# ──[ Copy Mode ]──────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in 2>/dev/null || xsel --clipboard --input 2>/dev/null || true"

# ──[ Visual / Behavior Tweaks ]───────────────────────────────────────────────
# Faster escape time (better for vim / shells)
set -sg escape-time 10

# Don't delay after exiting a pane
set -g detach-on-destroy off

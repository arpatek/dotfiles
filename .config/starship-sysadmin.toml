"$schema" = 'https://starship.rs/config-schema.json'

palette = "arpatek"

add_newline = false

format = '''
[┌─\[](structure)$username[@](muted)$hostname[\]\[](structure)$directory[\]](structure) $git_branch$git_state$git_status
[└─▪](structure)$character'''

# Starship modules
[character]
success_symbol = "[❯](success)"
error_symbol = "[❯](alert)"
vimcmd_symbol = "[❮](muted)"

[username]
style_user = "bold alert"
style_root = "bold alert"
format = "[$user]($style)"
show_always = true

[hostname]
ssh_only = false
format = "[$hostname]($style)"
style = "bold host"
trim_at = "."

[git_branch]
style = "bold branch"

[directory]
format = "[$path]($style)"
truncation_length = 4
style = "bold path"

# Palette — arpatek
[palettes.arpatek]
structure = "#4C566A"   # brackets, └─▪
muted     = "#4C566A"   # @ separator, ❮ vimcmd
link      = "#81A1C1"   # username (dev)
alert     = "#E67E80"   # username (sysadmin), ❯ error
host      = "#DBBC7F"   # hostname
path      = "#85C0B1"   # directory
branch    = "#A89BD4"   # git branch
success   = "#79be9a"   # ❯ success

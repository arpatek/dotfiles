"$schema" = 'https://starship.rs/config-schema.json'

palette = "arpatek"

add_newline = false

format = '''
[┌─\[](structure)$username[@](muted)$hostname[\]\[](structure)$directory[\]](structure) $git_branch$git_state$git_status$python$kubernetes$terraform$docker_context$aws
[└─▪](structure)$character'''

# Starship modules
[character]
success_symbol = "[❯](success)"
error_symbol = "[❯](alert)"
vimcmd_symbol = "[❮](muted)"

[username]
style_user = "bold link"
style_root = "bold alert"
format = "[$user]($style)"
show_always = true

[hostname]
ssh_only = false
format = "[$hostname]($style)"
style = "bold host"
trim_at = "."

[git_branch]
style = "bold branch"

[directory]
format = "[$path]($style)"
truncation_length = 4
style = "bold path"

[python]
symbol = " "
format = '[$symbol(\($virtualenv\))](path) '
detect_extensions = []
detect_files = []
detect_folders = []

[kubernetes]
disabled = false
symbol = "󱃾 "
format = '[$symbol$context](alert)[( \[$namespace\])](alert) '
detect_files = ['kustomization.yaml', 'Chart.yaml', '.helmignore', 'helmfile.yaml']
detect_extensions = []
detect_folders = []

[terraform]
symbol = " "
format = '[$symbol$workspace](branch) '

[docker_context]
symbol = " "
format = '[$symbol$context](path) '
only_with_files = false

[aws]
symbol = " "
format = '[$symbol$profile([$region])](host) '

# Palette — arpatek
[palettes.arpatek]
structure = "#4C566A"   # brackets, └─▪
muted     = "#4C566A"   # @ separator, ❮ vimcmd
link      = "#81A1C1"   # username (dev)
alert     = "#E67E80"   # username (sysadmin), ❯ error
host      = "#DBBC7F"   # hostname
path      = "#85C0B1"   # directory
branch    = "#A89BD4"   # git branch
success   = "#79be9a"   # ❯ success
